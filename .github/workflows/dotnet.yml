name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./src

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore src.sln

    - name: Build
      run: dotnet build src.sln --no-restore --configuration Release

    - name: Run Unit Tests
      run: dotnet test ../tests/Ticketing.UnitTests --no-build --verbosity normal

    - name: Run Integration Tests
      run: dotnet test ../tests/Ticketing.IntegrationTests --no-build --verbosity normal
